name: Move Trello In Progress Card To Completed List on PR Merge

on:
  pull_request:
    types:
      - closed  # Runs only when a PR is merged or closed

jobs:
  move_trello_card:
    if: github.event.pull_request.merged == true  # Only run if PR is merged
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug Secrets
        run: |
          echo "TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY != '' && '***' || 'NOT SET' }}"
          echo "TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN != '' && '***' || 'NOT SET' }}"
          echo "TRELLO_IN_PROGRESS_LIST_ID: ${{ secrets.TRELLO_IN_PROGRESS_LIST_ID != '' && '***' || 'NOT SET' }}"
          echo "TRELLO_COMPLETED_LIST_ID: ${{ secrets.TRELLO_COMPLETED_LIST_ID != '' && '***' || 'NOT SET' }}"

      - name: Extract Trello Card ID from PR Title
        id: extract_card_id
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          CARD_ID=$(echo "$PR_TITLE" | grep -o '#[A-Za-z0-9]*' | tr -d '#')

          if [[ -z "$CARD_ID" ]]; then
            echo "⚠️ No Trello Card ID found in PR title. Skipping move."
            echo "CARD_ID=" >> $GITHUB_ENV
            exit 0  # Exit successfully without failing the job
          fi

          echo "Extracted Card ID: $CARD_ID"
          echo "CARD_ID=$CARD_ID" >> $GITHUB_ENV

      - name: Set Environment Variables for Trello Secrets
        run: |
          echo "TRELLO_IN_PROGRESS_LIST_ID=${{ secrets.TRELLO_IN_PROGRESS_LIST_ID }}" >> $GITHUB_ENV
          echo "TRELLO_COMPLETED_LIST_ID=${{ secrets.TRELLO_COMPLETED_LIST_ID }}" >> $GITHUB_ENV
          echo "TRELLO_API_KEY=${{ secrets.TRELLO_API_KEY }}" >> $GITHUB_ENV
          echo "TRELLO_TOKEN=${{ secrets.TRELLO_TOKEN }}" >> $GITHUB_ENV

      - name: Get Current List of Trello Card
        if: env.CARD_ID != ''  # Only run if CARD_ID is set
        id: get_card_list
        run: |
          RESPONSE=$(curl -s "https://api.trello.com/1/cards/${{ env.CARD_ID }}?key=${{ env.TRELLO_API_KEY }}&token=${{ env.TRELLO_TOKEN }}")
          CURRENT_LIST_ID=$(echo "$RESPONSE" | jq -r '.idList')

          if [[ -z "$CURRENT_LIST_ID" || "$CURRENT_LIST_ID" == "null" ]]; then
            echo "⚠️ Could not fetch Trello card's current list ID. Skipping move."
            exit 0  # Exit successfully without failing the job
          fi

          echo "Current List ID: $CURRENT_LIST_ID"
          echo "CURRENT_LIST_ID=$CURRENT_LIST_ID" >> $GITHUB_ENV

      - name: Move Trello Card (Only if in 'In Progress' list)
        if: env.CARD_ID != '' && env.CURRENT_LIST_ID == env.TRELLO_IN_PROGRESS_LIST_ID
        run: |
          echo "✅ Card is in 'In Progress' list, moving to 'Completed'."
          curl -X PUT "https://api.trello.com/1/cards/${{ env.CARD_ID }}?key=${{ env.TRELLO_API_KEY }}&token=${{ env.TRELLO_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "idList": "${{ env.TRELLO_COMPLETED_LIST_ID }}"
            }'

      - name: Set Commit Status to Success (Green Check Mark On Job Completion)
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'GitHub Actions',
              description: 'Workflow completed successfully!',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
